name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC nightly

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      core_python: ${{ steps.filter.outputs.core_python }}
      arch: ${{ steps.filter.outputs.arch }}
      scenario_tests: ${{ steps.filter.outputs.scenario_tests }}
      regression_tests: ${{ steps.filter.outputs.regression_tests }}
      ui: ${{ steps.filter.outputs.ui }}
      ci: ${{ steps.filter.outputs.ci }}
      service_registry: ${{ steps.filter.outputs.service_registry }}
      orchestrator: ${{ steps.filter.outputs.orchestrator }}
      mockworld: ${{ steps.filter.outputs.mockworld }}
      dockerfiles: ${{ steps.filter.outputs.dockerfiles }}
      compose: ${{ steps.filter.outputs.compose }}
      sandbox_scenarios: ${{ steps.filter.outputs.sandbox_scenarios }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'src/**/*.py'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
            core_python:
              - 'src/**/*.py'
              - '!src/arch/**'
              - 'tests/**'
              - '!tests/architecture/**'
              - '!tests/regressions/**'
              - '!tests/scenarios/**'
              - '!tests/sandbox_scenarios/**'
              - 'pyproject.toml'
              - 'uv.lock'
            arch:
              - 'src/arch/**'
              - 'tests/architecture/**'
              - 'docs/arch/**'
              - 'docs/adr/**'
              - 'docs/wiki/**'
              - 'Makefile'
            scenario_tests:
              - 'tests/scenarios/**'
              - 'tests/sandbox_scenarios/**'
            regression_tests:
              - 'tests/regressions/**'
            ui:
              - 'src/ui/**'
            ci:
              - '.github/workflows/**'
            service_registry:
              - 'src/service_registry.py'
            orchestrator:
              - 'src/orchestrator.py'
            mockworld:
              - 'src/mockworld/**'
            dockerfiles:
              - 'Dockerfile*'
            compose:
              - 'docker-compose*.yml'
            sandbox_scenarios:
              - 'tests/sandbox_scenarios/**'
            dashboard:
              # The dashboard FRONT-end and the BACK-end the browser scenarios
              # boot (the real dashboard server + repo-runtime registry). #9347
              # broke orchestrator-start via these backend files; the `ui`
              # signal alone would not have tripped. See issue #9359.
              - 'src/ui/**'
              - 'src/dashboard.py'
              - 'src/dashboard_routes/**'
              - 'src/server.py'
              - 'src/repo_runtime.py'
              - 'src/route_types.py'
              - 'tests/scenarios/browser/**'
              - 'tests/scenarios/fakes/mock_world.py'

  # Universal backstop (#9482): reject leftover git conflict markers on EVERY
  # PR/push, ungated by `changes` — a docs-only commit (e.g. a bot wiki write)
  # must not bypass it. #9422 merged raw markers into 11 wiki-term files because
  # no gate inspected a docs-only change. stdlib-only; no uv sync needed.
  conflict-markers:
    name: Conflict Markers
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Scan tracked files for git conflict markers
        run: python3 scripts/check_conflict_markers.py --tracked

  lint:
    name: Lint & Format
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format . --check

  typecheck:
    name: Type Check
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Pyright
        run: uv run pyright

  security:
    name: Security Scan
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Bandit security scan
        run: uv run bandit -c pyproject.toml -r . --severity-level medium

  arch:
    name: Architecture Check
    needs: changes
    if: needs.changes.outputs.arch == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Validate functional_areas.yml
        run: |
          uv run python -c "from arch._functional_areas_schema import load_functional_areas; from pathlib import Path; load_functional_areas(Path('docs/arch/functional_areas.yml')); print('functional_areas.yml: schema OK')"
      - name: Drift check
        run: make arch-check
      - name: Architecture tests
        run: uv run pytest tests/architecture -x --tb=short

  test:
    name: Tests
    needs: changes
    if: needs.changes.outputs.core_python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Warning gate (targeted)
        run: PYTHONPATH=src uv run pytest tests/test_execution.py tests/test_agent_advanced.py tests/test_agent_cli.py tests/test_agent_execution.py tests/test_agent_lifecycle.py tests/test_agent_output.py tests/test_hitl_runner.py tests/test_prompt_telemetry.py tests/test_dashboard_routes_control.py tests/test_dashboard_routes_core.py tests/test_dashboard_routes_hitl.py tests/test_dashboard_routes_issue_history.py tests/test_dashboard_routes_metrics.py tests/test_dashboard_routes_repo.py tests/test_dashboard_routes_state.py -W error::RuntimeWarning -W error::pytest.PytestUnraisableExceptionWarning
      - name: Run tests with coverage
        run: PYTHONPATH=src uv run pytest tests/ --ignore=tests/regressions --cov=src --cov-fail-under=70 --cov-report=term-missing
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  smoke:
    name: Smoke Tests
    needs: changes
    if: needs.changes.outputs.core_python == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/ui/package-lock.json
      - name: Install Python dependencies
        run: uv sync --all-extras
      - name: Install UI dependencies
        working-directory: src/ui
        run: npm ci
      - name: Run smoke tests
        run: make smoke

  scenario:
    name: Scenario Tests
    needs: changes
    if: needs.changes.outputs.core_python == 'true' || needs.changes.outputs.scenario_tests == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run scenario tests
        run: make scenario
      - name: Run scenario loop tests
        run: make scenario-loops

  regression:
    name: Regression Tests
    needs: changes
    if: needs.changes.outputs.core_python == 'true' || needs.changes.outputs.regression_tests == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run regression tests
        run: PYTHONPATH=src uv run pytest tests/regressions/ -q

  audit:
    name: Principles Audit
    needs: changes
    if: needs.changes.outputs.core_python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Resolve origin HEAD
        # actions/checkout leaves refs/remotes/origin/HEAD unset on PR
        # checkouts (which are a merge commit, not a fetched branch).
        # P5.5 (branch-protection probe) needs origin/HEAD to detect the
        # default branch, so fetch main explicitly and point HEAD at it.
        run: |
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
          git symbolic-ref refs/remotes/origin/HEAD refs/remotes/origin/main
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run principles audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make audit

  ui-build:
    name: Dashboard Build
    needs: changes
    if: needs.changes.outputs.ui == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/ui/package-lock.json
      - name: Install dependencies
        working-directory: src/ui
        run: npm ci
      - name: Build
        working-directory: src/ui
        run: npm run build
      - name: Test
        working-directory: src/ui
        run: npm test

  sandbox-fast:
    name: Sandbox (PR→staging fast subset)
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      github.base_ref == 'staging' && (
        needs.changes.outputs.service_registry == 'true' ||
        needs.changes.outputs.orchestrator == 'true' ||
        needs.changes.outputs.mockworld == 'true' ||
        needs.changes.outputs.dockerfiles == 'true' ||
        needs.changes.outputs.compose == 'true' ||
        needs.changes.outputs.sandbox_scenarios == 'true'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv && uv pip install --system -e ".[dev]"
      - run: docker compose -f docker-compose.sandbox.yml build hydraflow ui playwright
      - name: Run fast subset (s01, s06)
        run: |
          for s in s01_happy_single_issue s06_kill_switch_via_ui; do
            python scripts/sandbox_scenario.py run $s || exit 1
          done
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-fast-results
          path: /tmp/sandbox-results/
          retention-days: 7

  # PR-time early warning for dashboard regressions. The full Browser Scenarios
  # suite only runs at rc/*->main promotion (rc-promotion-scenario.yml), which
  # meant the #9347 dashboard regression rode into staging unvalidated for ~4
  # days while the (separately-broken) promotion loop wasn't cutting RCs. This
  # runs a fast smoke+happy+controls subset on PR->staging whenever dashboard
  # front- or back-end code changes — catching orchestrator-start / pipeline
  # regressions at PR time. The full suite stays the final gate at promotion.
  # See issue #9359.
  scenario-browser-fast:
    name: Browser Scenarios (PR→staging fast subset)
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.base_ref == 'staging' && needs.changes.outputs.dashboard == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/ui/package-lock.json
      - name: Install Python deps
        run: uv sync --all-extras
      - name: Build UI
        working-directory: src/ui
        run: |
          npm ci
          npm run build
      - name: Install Chromium
        run: uv run python -m playwright install --with-deps chromium
      - name: Browser smoke + happy + orchestrator-controls subset
        run: |
          PYTHONPATH=src uv run pytest \
            tests/scenarios/browser/test_smoke.py \
            tests/scenarios/browser/scenarios/test_happy_browser.py \
            tests/scenarios/browser/workflows/test_orchestrator_controls.py \
            -m scenario_browser --reruns=1 -v
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-browser-fast-trace
          path: tests/scenarios/browser/_artifacts/
          retention-days: 7

  sandbox-full:
    name: Sandbox (rc/* promotion PR full suite)
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.base_ref == 'main' && startsWith(github.head_ref, 'rc/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv && uv pip install --system -e ".[dev]"
      - run: docker compose -f docker-compose.sandbox.yml build hydraflow ui playwright
      - name: Run full suite
        id: runall
        run: python scripts/sandbox_scenario.py run-all
      - name: Auto-label PR for self-fix on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label sandbox-fail-auto-fix
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "Sandbox suite failed. SandboxFailureFixerLoop will dispatch the auto-agent. Logs: \`/tmp/sandbox-results/\`"
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-full-results
          path: /tmp/sandbox-results/
          retention-days: 7

  sandbox-nightly:
    name: Sandbox (nightly regression)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv && uv pip install --system -e ".[dev]"
      - run: docker compose -f docker-compose.sandbox.yml build hydraflow ui playwright
      - name: Run full suite + record metrics
        run: python scripts/sandbox_scenario.py run-all
      - name: Open hydraflow-find issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create --title "Sandbox nightly failure $(date -I)" \
            --label hydraflow-find,sandbox-nightly \
            --body "Nightly sandbox run failed. Logs attached as artifact."
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-nightly-results
          path: /tmp/sandbox-results/
          retention-days: 14

  # Umbrella aggregator (ADR-0082 / add-a-gate runbook). One check that rolls up
  # every conditional CI job. `if: always()` + `needs:` means a path-filtered
  # SKIPPED job is treated as "passed", so requiring ONLY this single context in
  # branch protection gives strict gating without the path-filter footgun (a
  # skipped required check otherwise reads as "not passed" and blocks forever).
  # Not yet a required check: it must land on the base branch before being
  # required (see docs/standards/branch_protection/ADDING-A-GATE.md).
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [changes, lint, typecheck, security, arch, test, smoke, scenario, regression, audit, ui-build, scenario-browser-fast]
    if: always()
    steps:
      - name: Require all CI jobs to have passed or been skipped
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "Upstream job results: $RESULTS"
          for r in $RESULTS; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required CI job did not pass (result=$r)."
              exit 1
            fi
          done
          echo "All required CI jobs passed or were skipped (path-filtered)."
