# Source of truth for HydraFlow branch-protection gates.
#
# GENERATED ARTIFACTS -- do not hand-edit: main_ruleset.json, staging_ruleset.json,
# and the gate table inside the generated block in README.md.
# Regenerate with `make gen-gates`; CI fails on drift via `make gen-gates-check`.
# See docs/adr/<declarative-gate-contract> and ADR-0042 (two-tier branch model).
#
# Each [[gate]] is one (dimension, binding) pair. Resolution filters gates by
# the [repo] profile below: a gate applies only when its `languages` intersect
# the repo's and its `requires_capability` are all present. For a new repo this
# profile is populated by detect_languages + detect_capabilities at init time.

# This repo: Python with GitHub Advanced Security (CodeQL available).
[repo]
languages = ["python"]
capabilities = ["ghas"]

[branch.main]
allowed_merge_methods = ["merge"]
required_approving_review_count = 0
code_quality_severity = "errors"
[[branch.main.code_scanning]]
tool = "CodeQL"
security_alerts_threshold = "high_or_higher"
alerts_threshold = "errors"

[branch.staging]
allowed_merge_methods = ["squash", "merge"]
required_approving_review_count = 0

# --- core gates (required on main) ---
[[gate]]
name = "Tests"
dimension = "unit-tests"
make_target = "test"
tier = "core"
required_on = ["main"]
runs_on = ["staging", "rc"]
languages = ["python"]
requires_capability = []
status = "active"
workflow = "ci.yml"
job = "test"

